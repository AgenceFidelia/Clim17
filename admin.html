  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #2E86AB;
      --blue-dark: #256f8e;
      --orange: #F4A261;
      --orange-dark: #e8924d;
      --white: #ffffff;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-400: #94a3b8;
      --gray-600: #475569;
      --gray-800: #1e293b;
      --green: #16a34a;
      --red: #dc2626;
      --radius: 12px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--white);
      color: var(--gray-800);
      line-height: 1.5;
      min-height: 100vh;
    }

    .header {
      background: var(--blue);
      color: var(--white);
      padding: 1.25rem 0;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 1.375rem;
      font-weight: 800;
    }

    .header p {
      font-size: 0.875rem;
      opacity: 0.9;
      margin-top: 0.25rem;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1.25rem 3rem;
    }

    .section {
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .section__title {
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--blue);
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid var(--gray-200);
    }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--gray-600);
      margin-bottom: 0.375rem;
    }

    input, select {
      width: 100%;
      padding: 0.625rem 0.75rem;
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9375rem;
      background: var(--white);
    }

    input:focus, select:focus {
      outline: 2px solid rgba(46, 134, 171, 0.25);
      border-color: var(--blue);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.88; }
    .btn--blue { background: var(--blue); color: var(--white); }
    .btn--orange { background: var(--orange); color: var(--white); }
    .btn--ghost { background: var(--white); color: var(--gray-800); border: 1px solid var(--gray-200); }
    .btn--danger { background: var(--red); color: var(--white); }
    .btn--success { background: var(--green); color: var(--white); }
    .btn--sm { padding: 0.375rem 0.75rem; font-size: 0.8125rem; }

    .form-row {
      display: grid;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    @media (min-width: 640px) {
      .form-row--2 { grid-template-columns: 1fr 1fr; }
      .form-row--4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
    }

    .alert {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 1rem;
      display: none;
    }

    .alert.visible { display: block; }
    .alert--ok { background: rgba(22, 163, 74, 0.1); color: var(--green); border: 1px solid rgba(22, 163, 74, 0.25); }
    .alert--error { background: rgba(220, 38, 38, 0.1); color: var(--red); border: 1px solid rgba(220, 38, 38, 0.25); }

    .clim-list { display: grid; gap: 0.75rem; margin-bottom: 1.25rem; }

    .clim-item {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem;
      padding: 0.875rem 1rem;
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: 8px;
    }

    .clim-item__name { flex: 1; min-width: 120px; font-weight: 600; }

    .clim-item__name-input {
      flex: 1;
      min-width: 120px;
    }

    .badge {
      font-size: 0.6875rem;
      font-weight: 700;
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .badge--active { background: rgba(22, 163, 74, 0.12); color: var(--green); }
    .badge--inactive { background: var(--gray-100); color: var(--gray-600); }

    .clim-item__actions { display: flex; flex-wrap: wrap; gap: 0.5rem; }

    .add-clim {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: flex-end;
      padding-top: 1rem;
      border-top: 1px solid var(--gray-200);
    }

    .add-clim .field { flex: 1; min-width: 180px; }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
      background: var(--white);
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      padding: 0.75rem;
      text-align: left;
      border-bottom: 1px solid var(--gray-200);
    }

    th {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--gray-600);
      background: var(--gray-100);
    }

    .statut {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
    }

    .statut--confirmed { background: rgba(22, 163, 74, 0.12); color: var(--green); }
    .statut--pending { background: rgba(244, 162, 97, 0.2); color: #c6762a; }

    .actions { display: flex; flex-wrap: wrap; gap: 0.375rem; }

    .empty, .loading {
      text-align: center;
      padding: 1.5rem;
      color: var(--gray-400);
      font-size: 0.875rem;
    }

    #login-screen {
      display: block;
      min-height: 100vh;
      background: var(--gray-50);
    }

    #admin-panel {
      display: none;
    }
  </style>
</head>
<body>

  <div id="login-screen">
    <div style="max-width:380px; margin:100px auto; padding:2rem; background:white; border-radius:16px; box-shadow:0 8px 32px rgba(0,0,0,0.12);">
      <div style="text-align:center; margin-bottom:1.5rem;">
        <p style="font-size:2rem;">❄️</p>
        <h2 style="color:#2E86AB; margin:0;">Clim17 Admin</h2>
        <p style="color:#888; font-size:13px;">Accès réservé</p>
      </div>
      <div style="margin-bottom:1rem;">
        <label style="font-size:13px; font-weight:600; color:#333;">Identifiant</label>
        <input type="text" id="input-username" placeholder="Votre identifiant" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-top:4px; box-sizing:border-box; font-size:14px;">
      </div>
      <div style="margin-bottom:1.5rem;">
        <label style="font-size:13px; font-weight:600; color:#333;">Mot de passe</label>
        <input type="password" id="input-password" placeholder="Votre mot de passe" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-top:4px; box-sizing:border-box; font-size:14px;">
      </div>
      <button id="btn-login" style="width:100%; padding:12px; background:#2E86AB; color:white; border:none; border-radius:8px; font-size:15px; font-weight:600; cursor:pointer;">Se connecter</button>
      <p id="error-msg" style="display:none; color:#e34948; text-align:center; margin-top:1rem; font-size:13px;">Identifiant ou mot de passe incorrect.</p>
    </div>
  </div>

  <div id="admin-panel">
  <header class="header">
    <div class="container">
      <h1>Clim17 — Administration</h1>
      <p>Gestion du parc et des réservations</p>
    </div>
  </header>

  <main class="container">

    <!-- Section 1 — Gestion du parc -->
    <section class="section">
      <h2 class="section__title">Mon parc de climatiseurs</h2>
      <div class="clim-list" id="clim-list">
        <p class="loading">Chargement…</p>
      </div>
      <form class="add-clim" id="add-clim-form">
        <div class="field">
          <label for="new-clim-nom">Ajouter une clim</label>
          <input type="text" id="new-clim-nom" required placeholder="Ex: Clim-01">
        </div>
        <button type="submit" class="btn btn--blue">Ajouter une clim</button>
      </form>
    </section>

    <!-- Section 2 — Ajouter une réservation -->
    <section class="section">
      <h2 class="section__title">Ajouter une réservation</h2>
      <div class="alert alert--ok" id="res-success"></div>
      <div class="alert alert--error" id="res-error"></div>
      <form id="add-reservation-form">
        <div class="form-row form-row--2">
          <div>
            <label for="res-clim">Climatiseur</label>
            <select id="res-clim" required></select>
          </div>
          <div>
            <label for="res-client">Nom du client</label>
            <input type="text" id="res-client" required placeholder="Jean Dupont">
          </div>
        </div>
        <div class="form-row form-row--2">
          <div>
            <label for="input-adresse">Adresse de livraison</label>
            <input type="text" id="input-adresse" placeholder="162 rue de la Paix, La Rochelle">
          </div>
          <div>
            <label for="input-tarif">Tarif total (€)</label>
            <input type="number" id="input-tarif" placeholder="120.29" step="0.01" min="0">
          </div>
        </div>
        <div class="form-row form-row--4">
          <div>
            <label for="res-debut">Date début</label>
            <input type="date" id="res-debut" required>
          </div>
          <div>
            <label for="res-fin">Date fin</label>
            <input type="date" id="res-fin" required>
          </div>
          <div>
            <label for="res-statut">Statut</label>
            <select id="res-statut">
              <option value="confirmée">Confirmée</option>
              <option value="en attente">En attente</option>
            </select>
          </div>
          <div style="display:flex;align-items:flex-end">
            <button type="submit" class="btn btn--orange" style="width:100%">Ajouter</button>
          </div>
        </div>
      </form>
    </section>

    <!-- Section 3 — Liste des réservations -->
    <section class="section">
      <h2 class="section__title">Liste des réservations</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Clim</th>
              <th>Client</th>
              <th>Adresse</th>
              <th>Tarif</th>
              <th>Date début</th>
              <th>Date fin</th>
              <th>Statut</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="reservations-tbody">
            <tr><td colspan="8" class="loading">Chargement…</td></tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>
  </div>

  <script>
    let allClims = [];
    let allReservations = [];
    let editingClimId = null;

    function formatDateFr(d) {
      if (!d) return '—';
      var p = d.split('-');
      return p[2] + '/' + p[1] + '/' + p[0];
    }

    function formatTarif(n) {
      if (n == null || n === '' || isNaN(n)) return '—';
      var rounded = Math.round(parseFloat(n) * 100) / 100;
      return Number.isInteger(rounded)
        ? rounded + ',00 €'
        : rounded.toFixed(2).replace('.', ',') + ' €';
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function getClimName(id) {
      var c = allClims.find(function(x) { return x.id === id; });
      return c ? c.nom : 'Clim #' + id;
    }

    function showResMessage(type, text) {
      var ok = document.getElementById('res-success');
      var err = document.getElementById('res-error');
      ok.classList.remove('visible');
      err.classList.remove('visible');
      if (type === 'ok') {
        ok.textContent = text;
        ok.classList.add('visible');
      } else {
        err.textContent = text;
        err.classList.add('visible');
      }
      setTimeout(function() {
        ok.classList.remove('visible');
        err.classList.remove('visible');
      }, 4000);
    }

    async function chargerDonnees() {
      try {
        var results = await Promise.all([
          db.from('clims').select('*').order('id'),
          db.from('reservations').select('*').order('date_debut', { ascending: true })
        ]);

        if (results[0].error) throw results[0].error;
        if (results[1].error) throw results[1].error;

        allClims = results[0].data || [];
        allReservations = results[1].data || [];

        renderClims();
        renderReservations();
        populateClimSelect();
      } catch (e) {
        console.error(e);
        document.getElementById('clim-list').innerHTML =
          '<p class="empty">Erreur de chargement : ' + escapeHtml(e.message) + '</p>';
      }
    }

    function renderClims() {
      var list = document.getElementById('clim-list');

      if (!allClims.length) {
        list.innerHTML = '<p class="empty">Aucune climatiseur enregistrée.</p>';
        return;
      }

      list.innerHTML = allClims.map(function(c) {
        var editing = editingClimId === c.id;
        var nameBlock = editing
          ? '<input type="text" class="clim-item__name-input" id="edit-name-' + c.id + '" value="' + escapeHtml(c.nom) + '">'
          : '<span class="clim-item__name">' + escapeHtml(c.nom) + '</span>';

        return '<div class="clim-item">' +
          nameBlock +
          '<span class="badge ' + (c.actif ? 'badge--active' : 'badge--inactive') + '">' +
            (c.actif ? 'Active' : 'Inactive') + '</span>' +
          '<div class="clim-item__actions">' +
            (editing
              ? '<button type="button" class="btn btn--blue btn--sm" data-rename="' + c.id + '">Renommer</button>'
              : '<button type="button" class="btn btn--ghost btn--sm" data-edit="' + c.id + '">Renommer</button>') +
            '<button type="button" class="btn btn--ghost btn--sm" data-toggle="' + c.id + '">' +
              (c.actif ? 'Désactiver' : 'Activer') + '</button>' +
            '<button type="button" class="btn btn--danger btn--sm" data-delete="' + c.id + '">Supprimer</button>' +
          '</div></div>';
      }).join('');

      list.querySelectorAll('[data-edit]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          editingClimId = parseInt(btn.dataset.edit, 10);
          renderClims();
          var input = document.getElementById('edit-name-' + editingClimId);
          if (input) { input.focus(); input.select(); }
        });
      });

      list.querySelectorAll('[data-rename]').forEach(function(btn) {
        btn.addEventListener('click', function() { renameClim(parseInt(btn.dataset.rename, 10)); });
      });

      list.querySelectorAll('[data-toggle]').forEach(function(btn) {
        btn.addEventListener('click', function() { toggleClim(parseInt(btn.dataset.toggle, 10)); });
      });

      list.querySelectorAll('[data-delete]').forEach(function(btn) {
        btn.addEventListener('click', function() { deleteClim(parseInt(btn.dataset.delete, 10)); });
      });
    }

    function populateClimSelect() {
      var select = document.getElementById('res-clim');
      var active = allClims.filter(function(c) { return c.actif; });
      select.innerHTML = active.length
        ? active.map(function(c) {
            return '<option value="' + c.id + '">' + escapeHtml(c.nom) + '</option>';
          }).join('')
        : '<option value="">Aucune clim active</option>';
    }

    function renderReservations() {
      var tbody = document.getElementById('reservations-tbody');

      if (!allReservations.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="empty">Aucune réservation.</td></tr>';
        return;
      }

      tbody.innerHTML = allReservations.map(function(r) {
        var statutCls = r.statut === 'confirmée' ? 'statut--confirmed' : 'statut--pending';
        var confirmBtn = r.statut === 'en attente'
          ? '<button type="button" class="btn btn--success btn--sm" data-confirm="' + r.id + '">Confirmer</button>'
          : '';

        return '<tr>' +
          '<td>' + escapeHtml(getClimName(r.clim_id)) + '</td>' +
          '<td>' + escapeHtml(r.client_nom) + '</td>' +
          '<td>' + (r.adresse ? escapeHtml(r.adresse) : '—') + '</td>' +
          '<td>' + formatTarif(r.tarif) + '</td>' +
          '<td>' + formatDateFr(r.date_debut) + '</td>' +
          '<td>' + formatDateFr(r.date_fin) + '</td>' +
          '<td><span class="statut ' + statutCls + '">' + escapeHtml(r.statut) + '</span></td>' +
          '<td><div class="actions">' + confirmBtn +
            '<button type="button" class="btn btn--danger btn--sm" data-delete-res="' + r.id + '">Supprimer</button>' +
          '</div></td></tr>';
      }).join('');

      tbody.querySelectorAll('[data-confirm]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          confirmReservation(parseInt(btn.dataset.confirm, 10));
        });
      });

      tbody.querySelectorAll('[data-delete-res]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          deleteReservation(parseInt(btn.dataset.deleteRes, 10));
        });
      });
    }

    document.getElementById('add-clim-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      var nom = document.getElementById('new-clim-nom').value.trim();
      if (!nom) return;

      var result = await db.from('clims').insert({ nom: nom, actif: true });
      if (result.error) return alert('Erreur : ' + result.error.message);

      document.getElementById('new-clim-nom').value = '';
      editingClimId = null;
      chargerDonnees();
    });

    async function renameClim(id) {
      var input = document.getElementById('edit-name-' + id);
      if (!input) return;
      var nom = input.value.trim();
      if (!nom) return alert('Le nom ne peut pas être vide.');

      var result = await db.from('clims').update({ nom: nom }).eq('id', id);
      if (result.error) return alert('Erreur : ' + result.error.message);

      editingClimId = null;
      chargerDonnees();
    }

    async function toggleClim(id) {
      var clim = allClims.find(function(c) { return c.id === id; });
      if (!clim) return;

      var result = await db.from('clims').update({ actif: !clim.actif }).eq('id', id);
      if (result.error) return alert('Erreur : ' + result.error.message);
      chargerDonnees();
    }

    async function deleteClim(id) {
      if (!confirm('Êtes-vous sûr de vouloir supprimer cette climatiseur ?')) return;

      var result = await db.from('clims').delete().eq('id', id);
      if (result.error) return alert('Erreur : ' + result.error.message);

      editingClimId = null;
      chargerDonnees();
    }

    document.getElementById('add-reservation-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      var climId = parseInt(document.getElementById('res-clim').value, 10);
      var clientNom = document.getElementById('res-client').value.trim();
      var dateDebut = document.getElementById('res-debut').value;
      var dateFin = document.getElementById('res-fin').value;
      var statut = document.getElementById('res-statut').value;

      if (!climId) {
        showResMessage('error', 'Aucune clim active disponible.');
        return;
      }

      if (dateFin < dateDebut) {
        showResMessage('error', 'La date de fin doit être après la date de début.');
        return;
      }

      var result = await db.from('reservations').insert({
        clim_id: climId,
        client_nom: clientNom,
        date_debut: dateDebut,
        date_fin: dateFin,
        statut: statut,
        adresse: document.getElementById('input-adresse').value,
        tarif: parseFloat(document.getElementById('input-tarif').value) || null
      });

      if (result.error) {
        showResMessage('error', 'Erreur : ' + result.error.message);
        return;
      }

      showResMessage('ok', '✅ Réservation ajoutée avec succès.');
      document.getElementById('add-reservation-form').reset();
      chargerDonnees();
    });

    async function confirmReservation(id) {
      var result = await db.from('reservations').update({ statut: 'confirmée' }).eq('id', id);
      if (result.error) return alert('Erreur : ' + result.error.message);
      chargerDonnees();
    }

    async function deleteReservation(id) {
      if (!confirm('Supprimer cette réservation ?')) return;

      var result = await db.from('reservations').delete().eq('id', id);
      if (result.error) return alert('Erreur : ' + result.error.message);
      chargerDonnees();
    }

    document.getElementById('btn-login').addEventListener('click', async function() {
      var username = document.getElementById('input-username').value.trim();
      var password = document.getElementById('input-password').value.trim();
      var errorMsg = document.getElementById('error-msg');

      if (!username || !password) {
        errorMsg.style.display = 'block';
        return;
      }

      errorMsg.style.display = 'none';

      var result = await db
        .from('admin_users')
        .select('*')
        .eq('username', username)
        .eq('password', password)
        .single();

      if (result.data && !result.error) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
        chargerDonnees();
      } else {
        errorMsg.style.display = 'block';
      }
    });

    document.addEventListener('keypress', function(e) {
      if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') {
        document.getElementById('btn-login').click();
      }
    });
  </script>
</body>
</html>
